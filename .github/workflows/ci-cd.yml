name: Pipeline CI/CD Jihene

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  tests:
    name: Tests automatiques
    runs-on: ubuntu-latest

    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Lancer les tests
      run: |
        cd app
        python test_app.py
        echo "Tests passes avec succes !"
  verification-code:
    name: Verification du code
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3

    - name: Verifier app.py
      run: |
        # 1. Vérifier que app/app.py existe
        if [ -f app/app.py ]; then
            echo "✅ app.py existe"
        else
            echo "❌ app.py introuvable"
            exit 1
        fi

        # 2. Compter les lignes — tu connais cette commande !
        LIGNES=$(wc -l <  app/app.py)
        echo "Nombre de lignes : $LIGNES"

        # 3. Afficher résumé
        echo "Verification terminee avec succes !"
       
  build-docker:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [tests, verification-code]

    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3

    - name: Connexion Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build et Push image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: jihenezgolli/devops-jihene:latest

  notification:
    name: Notification fin pipeline
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
    - name: Pipeline termine
      run: |
        echo "Pipeline CI/CD termine avec succes !"
        echo "Image jihene-zgolli/devops-jihene:latest disponible"
        echo "Pret pour deploiement Kubernetes"
